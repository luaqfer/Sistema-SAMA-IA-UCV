<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAM Inteligente | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pequeña animación para el semáforo */
        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-2xl">⚙️</span>
            <h1 class="text-xl font-bold tracking-wider">EAM Inteligente <span class="text-blue-300 text-sm">| Motor Mamdani</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="bg-blue-800 px-3 py-1 rounded-full text-sm">👤 Admin Principal</span>
            <span id="server-status" class="flex items-center gap-2 text-sm font-semibold text-yellow-400">
                <span class="w-3 h-3 rounded-full bg-yellow-400"></span> Conectando...
            </span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-8 p-4">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
                <h3 class="text-slate-500 text-sm font-bold uppercase">Total Activos</h3>
                <p id="stat-total" class="text-3xl font-bold text-slate-800 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-green-500">
                <h3 class="text-slate-500 text-sm font-bold uppercase">Operativos</h3>
                <p id="stat-operativos" class="text-3xl font-bold text-green-600 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-red-500 pulse-red">
                <h3 class="text-slate-500 text-sm font-bold uppercase">Bloqueados por IA</h3>
                <p id="stat-bloqueados" class="text-3xl font-bold text-red-600 mt-2">--</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-700">Inventario Patrimonial en Tiempo Real</h2>
                <button onclick="cargarActivos()" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-lg text-sm font-semibold transition">
                    🔄 Actualizar Datos
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-500 text-sm uppercase">
                            <th class="p-4 font-semibold">ID QR</th>
                            <th class="p-4 font-semibold">Nombre del Activo</th>
                            <th class="p-4 font-semibold">Categoría</th>
                            <th class="p-4 font-semibold">Valor (PEN)</th>
                            <th class="p-4 font-semibold">Estado Actual</th>
                            <th class="p-4 font-semibold">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-activos" class="text-sm divide-y divide-slate-200">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-slate-500">Cargando base de datos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "http://localhost:8000"; // Tu IP del backend

        // Función para cargar los activos al iniciar la página
        async function cargarActivos() {
            const tabla = document.getElementById('tabla-activos');
            const statusIndicator = document.getElementById('server-status');
            
            try {
                // Hacemos la petición a FastAPI
                const response = await fetch(`${API_URL}/api/activos`);
                
                if (!response.ok) throw new Error("Error en el servidor");
                
                const activos = await response.json();
                
                // Actualizar indicador de servidor
                statusIndicator.innerHTML = '<span class="w-3 h-3 rounded-full bg-green-400"></span> Servidor Online';
                statusIndicator.className = "flex items-center gap-2 text-sm font-semibold text-green-400";

                // Limpiar tabla
                tabla.innerHTML = '';

                let operativos = 0;
                let bloqueados = 0;

                // Dibujar filas
                activos.forEach(activo => {
                    // Lógica visual del semáforo en la tabla
                    let badgeClass = activo.estado_operativo === "OPERATIVO" 
                                     ? "bg-green-100 text-green-800 border-green-200" 
                                     : "bg-red-100 text-red-800 border-red-200 font-bold";
                    
                    if(activo.estado_operativo === "OPERATIVO") operativos++;
                    else bloqueados++;

                    const fila = `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="p-4 font-mono text-slate-600 text-xs">${activo.codigo_qr}</td>
                            <td class="p-4 font-semibold text-slate-800">${activo.nombre_activo}</td>
                            <td class="p-4 text-slate-500">${activo.nombre_categoria}</td>
                            <td class="p-4 text-slate-700 font-mono">S/ ${activo.valor_adquisicion.toFixed(2)}</td>
                            <td class="p-4">
                                <span class="px-3 py-1 rounded-full text-xs border ${badgeClass}">
                                    ${activo.estado_operativo}
                                </span>
                            </td>
                            <td class="p-4">
                                <button class="text-blue-600 hover:text-blue-800 font-semibold text-sm">
                                    Ver Detalle
                                </button>
                            </td>
                        </tr>
                    `;
                    tabla.innerHTML += fila;
                });

                // Actualizar tarjetas de estadísticas
                document.getElementById('stat-total').innerText = activos.length;
                document.getElementById('stat-operativos').innerText = operativos;
                document.getElementById('stat-bloqueados').innerText = bloqueados;

            } catch (error) {
                console.error("Error conectando al backend:", error);
                statusIndicator.innerHTML = '<span class="w-3 h-3 rounded-full bg-red-500"></span> Servidor Desconectado';
                statusIndicator.className = "flex items-center gap-2 text-sm font-semibold text-red-500";
                tabla.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 font-bold">⚠️ No se pudo conectar con el Motor de IA (FastAPI). Verifica que el servidor de Python esté corriendo.</td></tr>`;
            }
        }

        // Ejecutar inmediatamente al abrir la página
        window.onload = cargarActivos;
    </script>
</body>
</html>
